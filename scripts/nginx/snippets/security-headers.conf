# Common security headers — included from each HTTPS server block.
# X-Frame-Options is intentionally absent here: dash.proboi.site /dashboard must
# be embeddable inside the Telegram Mini App iframe (V-04). Each vhost sets its
# own X-Frame-Options where appropriate (see sites-available/*.conf).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
