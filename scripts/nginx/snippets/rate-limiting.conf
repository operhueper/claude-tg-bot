# Rate limiting zones — must be included inside the http {} block of nginx.conf.
# Example: include /etc/nginx/snippets/rate-limiting.conf;
#
# V-30C: zone=api: 30r/m per IP (aligns with burst=20 in location blocks).
# zone=webhook: 120r/m — higher to absorb YooKassa payment notification bursts.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=120r/m;
