# dash.proboi.site — admin dashboard view, fully proxied to bot:3848
# Both server blocks active. Shares cert with proboi.site.

server {
    listen 80;
    listen [::]:80;
    server_name dash.proboi.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dash.proboi.site;

    ssl_certificate     /etc/letsencrypt/live/proboi.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proboi.site/privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;
    # Server-level fallback for non-dashboard locations (/api/, /).
    # /dashboard location has its own add_header directives and does NOT inherit
    # this value (nginx drops parent headers when a location sets any add_header).
    add_header X-Frame-Options "SAMEORIGIN" always;
    client_max_body_size 50M;

    location /dashboard {
        # No X-Frame-Options — Telegram Mini App must be able to embed this page.
        # (server-block SAMEORIGIN is not inherited here because this location
        # sets its own add_header; the empty string below is a no-op safety net.)
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "frame-ancestors https://web.telegram.org https://*.telegram.org" always;
        proxy_pass http://127.0.0.1:3848;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        client_max_body_size 1M;
        proxy_pass http://127.0.0.1:3848;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://127.0.0.1:3848;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
