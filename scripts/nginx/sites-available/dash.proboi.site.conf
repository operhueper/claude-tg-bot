# dash.proboi.site — admin dashboard view, fully proxied to bot:3848
# Both server blocks active. Shares cert with proboi.site.

server {
    listen 80;
    listen [::]:80;
    server_name dash.proboi.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dash.proboi.site;

    ssl_certificate     /etc/letsencrypt/live/proboi.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proboi.site/privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;
    client_max_body_size 50M;

    location /dashboard {
        # Allow embedding in Telegram Mini App iframe; clear global DENY.
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "frame-ancestors https://web.telegram.org https://*.telegram.org" always;
        proxy_pass http://127.0.0.1:3848;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://127.0.0.1:3848;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
