# design.proboi.site — Open Design web app (Next.js dev/prod) on :17573
# WebSocket-friendly proxy with long timeouts to survive HMR / streaming.
# Both server blocks active. Shares cert with proboi.site.

server {
    listen 80;
    listen [::]:80;
    server_name design.proboi.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name design.proboi.site;

    ssl_certificate     /etc/letsencrypt/live/proboi.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proboi.site/privkey.pem;

    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;
    # Open Design app — framing by external origins not expected.
    add_header X-Frame-Options "SAMEORIGIN" always;
    client_max_body_size 50M;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd_design;

    # Long timeouts: Next dev server streams compile output; HMR uses WS.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:17573;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
