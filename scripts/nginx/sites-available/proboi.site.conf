# proboi.site — landing + bot dashboard/API + per-user static pages
#
# Both server blocks are active. Cert files at /etc/letsencrypt/live/proboi.site/
# must exist before nginx can load this config — issue-certs.sh bootstraps a
# self-signed pair on first run, then replaces it with a real LE cert.

server {
    listen 80;
    listen [::]:80;
    server_name proboi.site www.proboi.site;

    # ACME http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name proboi.site www.proboi.site;

    ssl_certificate     /etc/letsencrypt/live/proboi.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proboi.site/privkey.pem;

    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;
    # proboi.site content should not be embedded by third-party origins.
    # /dashboard location overrides this with its own add_header directives
    # (nginx drops server-block headers when a location sets any add_header).
    add_header X-Frame-Options "SAMEORIGIN" always;
    client_max_body_size 50M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    root /var/www/proboi;

    location = / {
        try_files /index.html =404;
    }

    location = /favicon.ico { try_files $uri =404; }
    location = /robots.txt  { try_files $uri =404; }

    # Per-user static pages: https://proboi.site/u/{userId}/
    location /u/ {
        alias /var/www/u/;
        autoindex off;
        index index.html;
        try_files $uri $uri/ =404;
        # V-30A: guest pages must not load external scripts or embed external frames.
        add_header Content-Security-Policy "default-src 'self'; script-src 'none'; style-src 'unsafe-inline'; img-src 'self' data:;" always;
        add_header X-Content-Type-Options "nosniff" always;
        location ~ /\. { deny all; }
    }

    # Bot-served Mini App + JSON APIs + healthcheck.
    # proxy_http_version 1.1 + empty Connection lets nginx pool keep-alive
    # connections to the bot upstream (Bun HTTP server supports HTTP/1.1).
    location /dashboard {
        # Allow embedding in Telegram Mini App iframe; clear global DENY.
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "frame-ancestors https://web.telegram.org https://*.telegram.org" always;
        proxy_pass http://127.0.0.1:3848;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        client_max_body_size 1M;
        proxy_pass http://127.0.0.1:3848;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # V-30C: YooKassa and other inbound webhooks — higher burst ceiling.
    location /webhook/ {
        limit_req zone=webhook burst=30 nodelay;
        client_max_body_size 1M;
        proxy_pass http://127.0.0.1:3848;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /healthz {
        proxy_pass http://127.0.0.1:3848;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Anything else: static only — never fall through to bot.
    location / {
        try_files $uri $uri/ =404;
    }
}
